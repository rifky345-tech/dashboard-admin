<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdminFlow | Modern Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script src="https://icon-cdn.pages.dev/all.js" defer></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="bg-slate-100 font-sans">
    <div class="flex h-screen overflow-hidden">
      <aside
        id="sidebar"
        class="sidebar-open fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 text-white transform transition-all duration-300 lg:relative lg:translate-x-0"
      >
        <div
          class="flex items-center justify-between h-16 px-6 border-b border-slate-800"
        >
          <a href="#dashboard" class="flex items-center space-x-3">
            <div
              class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center"
            >
              <i class="fa-solid fa-bolt text-white text-lg"></i>
            </div>
            <span class="text-xl font-bold tracking-tight">AdminFlow</span>
          </a>
          <button
            id="closeSidebar"
            class="lg:hidden text-slate-400 hover:text-white transition-colors"
          >
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
          <p
            class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3"
          >
            Menu Utama
          </p>

          <a
            href="#dashboard"
            data-page="dashboard"
            class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200"
          >
            <i class="fa-solid fa-gauge-high w-5 mr-3"></i>Dashboard
          </a>

          <a
            href="#analytics"
            data-page="analytics"
            class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200"
          >
            <i class="fa-solid fa-chart-line w-5 mr-3"></i>Analytics
          </a>

          <a
            href="#users"
            data-page="users"
            class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200"
          >
            <i class="fa-solid fa-users w-5 mr-3"></i>Users
            <span
              class="ml-auto bg-indigo-500/20 text-white text-xs font-bold px-2 py-0.5 rounded-full"
              >128</span
            >
          </a>

          <a
            href="#products"
            data-page="products"
            class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200"
          >
            <i class="fa-solid fa-box w-5 mr-3"></i>Products
          </a>

          <a
            href="#orders"
            data-page="orders"
            class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200"
          >
            <i class="fa-solid fa-shopping-cart w-5 mr-3"></i>Orders
            <span
              class="ml-auto bg-emerald-500/20 text-white text-xs font-bold px-2 py-0.5 rounded-full"
              >24</span
            >
          </a>

          <p
            class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-8 mb-3"
          >
            Pengaturan
          </p>

          <a
            href="#settings"
            data-page="settings"
            class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200"
          >
            <i class="fa-solid fa-gear w-5 mr-3"></i>Settings
          </a>
        </nav>

        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-slate-800">
          <a
            href="#"
            class="flex items-center px-4 py-3 rounded-xl text-sm font-medium text-white bg-red-500 justify-center"
          >
            <i class="fa-solid fa-left-from-bracket w-5 mr-3"></i>Logout
          </a>
        </div>
      </aside>

      <!-- Sidebar Overlay (Mobile) -->
      <div
        id="sidebarOverlay"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden lg:hidden"
      ></div>

      <!-- Main Content -->
      <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Top Navbar -->
        <header
          class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 flex-shrink-0"
        >
          <div class="flex items-center space-x-4">
            <button
              id="openSidebar"
              class="lg:hidden text-slate-600 hover:text-slate-900 transition-colors"
            >
              <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <div
              class="hidden md:flex items-center bg-slate-100 rounded-xl px-4 py-2.5 w-80"
            >
              <i class="fa-solid fa-magnifying-glass text-slate-400 mr-3"></i>
              <input
                type="text"
                placeholder="Search anything..."
                class="bg-transparent border-none outline-none text-sm w-full placeholder-slate-400"
              />
            </div>
          </div>

          <div class="flex items-center space-x-3">
            <button
              class="relative w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 hover:bg-slate-200 transition-colors"
            >
              <i class="fa-solid fa-bell text-slate-600"></i>
              <span
                class="absolute top-1 right-1 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-white"
              ></span>
            </button>
            <button
              class="relative w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 hover:bg-slate-200 transition-colors"
            >
              <i class="fa-solid fa-message text-slate-600"></i>
              <span
                class="absolute top-1 right-1 w-2.5 h-2.5 bg-emerald-500 rounded-full border-2 border-white"
              ></span>
            </button>
            <div
              class="flex items-center space-x-3 pl-3 border-l border-slate-200"
            >
              <img
                src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff&size=128"
                alt="User"
                class="w-9 h-9 rounded-full"
              />
              <div class="hidden md:block">
                <h4 class="text-sm font-semibold text-slate-900">Admin User</h4>
                <p class="text-xs text-slate-500">Super Admin</p>
              </div>
              <i
                class="fa-solid fa-chevron-down text-slate-400 text-xs hidden md:block"
              ></i>
            </div>
          </div>
        </header>

        <!-- Page Content Container -->
        <main id="pageContent" class="flex-1 overflow-y-auto p-6">
          <!-- Content will be loaded here dynamically -->
          <div class="flex items-center justify-center h-full">
            <div class="text-center">
              <i
                class="fa-solid fa-spinner fa-spin text-4xl text-indigo-500 mb-4"
              ></i>
              <p class="text-slate-500">Loading...</p>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      // Sidebar Toggle
      const sidebar = document.getElementById("sidebar");
      const sidebarOverlay = document.getElementById("sidebarOverlay");
      const openSidebarBtn = document.getElementById("openSidebar");
      const closeSidebarBtn = document.getElementById("closeSidebar");
      const pageContent = document.getElementById("pageContent");

      function openSidebar() {
        sidebar.classList.remove("-translate-x-full");
        sidebarOverlay.classList.remove("hidden");
      }

      function closeSidebar() {
        sidebar.classList.add("-translate-x-full");
        sidebarOverlay.classList.add("hidden");
      }

      openSidebarBtn.addEventListener("click", openSidebar);
      closeSidebarBtn.addEventListener("click", closeSidebar);
      sidebarOverlay.addEventListener("click", closeSidebar);

      // Initialize sidebar state for mobile
      if (window.innerWidth < 1024) {
        sidebar.classList.add("-translate-x-full");
      }

      window.addEventListener("resize", () => {
        if (window.innerWidth >= 1024) {
          sidebar.classList.remove("-translate-x-full");
          sidebarOverlay.classList.add("hidden");
        } else {
          sidebar.classList.add("-translate-x-full");
        }
      });

      // Router - Load page content
      async function loadPage(pageName) {
        // Update active nav
        document.querySelectorAll(".nav-item").forEach((item) => {
          item.classList.remove("active");
          if (item.dataset.page === pageName) {
            item.classList.add("active");
          }
        });

        // Show loading
        pageContent.innerHTML = `
          <div class="flex items-center justify-center h-full">
            <div class="text-center">
              <i class="fa-solid fa-spinner fa-spin text-4xl text-indigo-500 mb-4"></i>
              <p class="text-slate-500">Loading...</p>
            </div>
          </div>
        `;

        try {
          const response = await fetch(`/page/${pageName}.html`);
          if (response.ok) {
            const html = await response.text();

            // Bersihkan chart yang ada sebelum mengganti konten
            if (typeof Chart !== "undefined" && Chart.instances) {
              Object.values(Chart.instances).forEach((instance) =>
                instance.destroy(),
              );
            }

            pageContent.innerHTML = html;

            // Execute scripts that were loaded dynamically with a slight delay (100ms)
            // to ensure the DOM is fully rendered and browser has painted the elements.
            setTimeout(() => {
              const scripts = pageContent.querySelectorAll("script");
              scripts.forEach((oldScript) => {
                const newScript = document.createElement("script");

                // Copy all attributes
                Array.from(oldScript.attributes).forEach((attr) => {
                  newScript.setAttribute(attr.name, attr.value);
                });

                if (oldScript.src) {
                  newScript.src = oldScript.src;
                } else {
                  // IMPORTANT: Wrap in IIFE to avoid SyntaxError when re-declaring const/let
                  // variables on subsequent page navigations.
                  newScript.textContent = `(function() { 
                    try {
                      ${oldScript.textContent} 
                    } catch (e) {
                      console.error("Dynamic Script Error:", e);
                    }
                  })();`;
                }

                // Replace the script to trigger execution in its own scope
                const parent = oldScript.parentNode;
                if (parent) parent.replaceChild(newScript, oldScript);
              });
            }, 100);
          } else {
            pageContent.innerHTML = `
              <div class="flex items-center justify-center h-full">
                <div class="text-center">
                  <i class="fa-solid fa-exclamation-triangle text-4xl text-amber-500 mb-4"></i>
                  <h2 class="text-xl font-bold text-slate-900 mb-2">Page Not Found</h2>
                  <p class="text-slate-500">The page "${pageName}" could not be found.</p>
                </div>
              </div>
            `;
          }
        } catch (error) {
          pageContent.innerHTML = `
            <div class="flex items-center justify-center h-full">
              <div class="text-center">
                <i class="fa-solid fa-times-circle text-4xl text-rose-500 mb-4"></i>
                <h2 class="text-xl font-bold text-slate-900 mb-2">Error Loading Page</h2>
                <p class="text-slate-500">${error.message}</p>
              </div>
            </div>
          `;
        }

        // Close mobile sidebar after navigation
        if (window.innerWidth < 1024) {
          closeSidebar();
        }
      }

      // Handle hash change
      function handleRoute() {
        const hash = window.location.hash.slice(1) || "dashboard";
        loadPage(hash);
      }

      // Listen for hash changes
      window.addEventListener("hashchange", handleRoute);

      // Initial load
      handleRoute();
    </script>
  </body>
</html>
